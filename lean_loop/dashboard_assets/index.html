<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lean Agent Dashboard</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-block">
      <div class="brand-mark">L</div>
      <div>
        <h1>Lean Agent</h1>
        <p id="projectPath">正在加载项目...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="button secondary" id="configButton" type="button">配置</button>
      <button class="button secondary" id="addTaskButton" type="button">添加任务</button>
      <button class="button primary" id="startWorkerButton" type="button">启动队列</button>
      <div class="connection" id="connectionState"><span></span>连接中</div>
    </div>
  </header>

  <section class="summary-band" aria-label="任务摘要">
    <div><strong id="countActive">0</strong><span>运行中</span></div>
    <div><strong id="countQueued">0</strong><span>等待</span></div>
    <div><strong id="countSucceeded">0</strong><span>成功</span></div>
    <div><strong id="countFailed">0</strong><span>失败/取消</span></div>
    <div class="active-process"><span>当前进程</span><strong id="activeProcess">Idle</strong></div>
  </section>

  <div class="toast hidden" id="toast" role="status"></div>

  <main class="workspace">
    <section class="list-panel">
      <div class="panel-tabs" role="tablist">
        <button class="panel-tab active" data-list="tasks" role="tab">任务</button>
        <button class="panel-tab" data-list="workflows" role="tab">Workflows</button>
      </div>
      <div class="list-header" id="listHeader">
        <span>目标</span><span>状态</span><span>尝试</span><span>更新时间</span>
      </div>
      <div class="item-list" id="itemList"></div>
      <div class="empty-list hidden" id="emptyList">暂无任务</div>
    </section>

    <section class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <strong>选择一个任务或 workflow</strong>
        <span>查看证明过程、诊断和耗时</span>
      </div>
      <div class="detail-content hidden" id="detailContent">
        <div class="detail-heading">
          <div>
            <div class="eyebrow" id="detailId"></div>
            <h2 id="detailTitle"></h2>
          </div>
          <div class="detail-actions">
            <button class="button danger hidden" id="cancelTaskButton" type="button">取消任务</button>
            <button class="button secondary hidden" id="retryTaskButton" type="button">重试任务</button>
            <span class="status-badge" id="detailStatus"></span>
          </div>
        </div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-tabs" role="tablist">
          <button class="detail-tab active" data-tab="overview">概览</button>
          <button class="detail-tab" data-tab="proof">证明</button>
          <button class="detail-tab" data-tab="diagnostics">诊断</button>
          <button class="detail-tab" data-tab="review">Plan / Review</button>
          <button class="detail-tab" data-tab="timing">耗时</button>
          <button class="detail-tab" data-tab="events">事件</button>
        </div>
        <div class="tab-body" id="tabBody"></div>
      </div>
    </section>
  </main>

  <dialog id="taskDialog">
    <form id="taskForm">
      <div class="dialog-heading">
        <div>
          <h2>添加证明任务</h2>
          <p>任务先进入队列，启动 worker 后才会调用模型。</p>
        </div>
        <button class="icon-button" id="closeTaskDialog" type="button" aria-label="关闭" title="关闭">&times;</button>
      </div>

      <label class="field">
        <span>Lean 文件</span>
        <input id="taskFile" name="target_file" list="leanFiles" placeholder="留空自动创建 GeneratedProof_*.lean">
        <datalist id="leanFiles"></datalist>
      </label>
      <label class="field">
        <span>证明要求</span>
        <textarea id="taskText" name="task_text" required rows="6" placeholder="保持 theorem 声明不变，允许重写证明体；完成证明并通过 Lean 检查。"></textarea>
      </label>
      <label class="field">
        <span>依赖任务（可多选）</span>
        <select id="taskDependencies" name="dependencies" multiple size="4"></select>
      </label>

      <details class="advanced-settings">
        <summary>高级设置</summary>
        <div class="settings-grid">
          <label class="field"><span>Provider</span><select id="taskProvider"></select></label>
          <label class="field model-field"><span>主模型</span><input id="taskModel" type="text" placeholder="留空使用 LEAN_AGENT_MODEL"></label>
          <label class="field"><span>全局最大候选</span><input id="maxAttempts" type="number" min="1" max="100" value="12"></label>
          <label class="field"><span>每步最大候选</span><input id="maxAttemptsPerStep" type="number" min="1" max="20" value="3"></label>
          <label class="field"><span>Lean 超时（秒）</span><input id="leanTimeout" type="number" min="1" value="120"></label>
          <label class="field"><span>API 超时（秒）</span><input id="apiTimeout" type="number" min="1" placeholder="使用环境默认值"></label>
          <label class="field"><span>API 超时重试</span><input id="apiRetries" type="number" min="0" max="5" value="1"></label>
          <label class="field"><span>Import 策略</span><select id="importPolicy"><option value="auto" selected>自动</option><option value="proof-first">证明优先，成功后缩小</option><option value="precise">检查前必须精确</option><option value="broad">保留 import Mathlib</option></select></label>
          <label class="field"><span>证明规划模式</span><select id="planningMode"><option value="planner" selected>Planner（默认）</option><option value="direct-then-planner">Direct 失败 3 次后 Planner</option><option value="direct">仅 Direct Proof</option></select></label>
          <label class="field"><span>Plan 强度</span><select id="planEffort"><option>low</option><option>medium</option><option selected>high</option><option>xhigh</option></select></label>
          <label class="field"><span>Prove 强度</span><select id="proveEffort"><option>low</option><option>medium</option><option selected>high</option><option>xhigh</option></select></label>
          <label class="field"><span>Review 强度</span><select id="reviewEffort"><option>low</option><option selected>medium</option><option>high</option><option>xhigh</option></select></label>
          <label class="field model-field"><span>完整冻结声明（逗号分隔）</span><input id="protectedDeclarations" type="text" placeholder="root_gt_one, key_definition"></label>
        </div>
        <label class="check-field"><input id="protectExistingStatements" type="checkbox" checked><span>保护已有 theorem/lemma 的声明</span></label>
        <label class="check-field"><input id="formalizeGoal" type="checkbox" checked><span>新文件先把自然语言转换为正式 Lean 声明并验证</span></label>
        <label class="check-field"><input id="explainProof" type="checkbox" checked><span>成功后生成中文自然语言证明</span></label>
        <label class="check-field"><input id="keepFailed" type="checkbox"><span>保留最后一次失败的候选文件</span></label>
        <label class="check-field"><input id="multiProver" type="checkbox"><span>启用单机多 Prover worktree</span></label>
        <div class="lane-editor hidden" id="laneEditor">
          <div class="lane-editor-heading">
            <strong>证明路线</strong>
            <span>first_verified_wins</span>
          </div>
          <div id="laneList"></div>
          <button class="button secondary" id="addLaneButton" type="button">添加路线</button>
        </div>
      </details>

      <div class="dialog-actions">
        <button class="button secondary" id="cancelTaskDialog" type="button">返回</button>
        <button class="button primary" id="submitTaskButton" type="submit">加入队列</button>
      </div>
    </form>
  </dialog>

  <dialog id="configDialog">
    <form id="configForm">
      <div class="dialog-heading">
        <div>
          <h2>项目运行配置</h2>
          <p>保存在当前 Lean 项目的 .lean-agent 目录；API Key 使用 Windows DPAPI 加密。</p>
        </div>
        <button class="icon-button" id="closeConfigDialog" type="button" aria-label="关闭" title="关闭">&times;</button>
      </div>
      <div class="settings-grid config-grid">
        <label class="field"><span>Provider 档案</span><select id="configProviderSelect"></select></label>
        <label class="field"><span>Provider ID</span><input id="configProviderId" type="text" maxlength="32" placeholder="deepseek"></label>
        <label class="field"><span>Provider 类型</span><select id="configProviderKind"><option value="openai-compatible">OpenAI Compatible</option><option value="deepseek">DeepSeek Official</option></select></label>
        <label class="field model-field"><span>API Base</span><input id="configApiBase" type="url" required placeholder="https://www.heilovehei.com"></label>
        <label class="field"><span>默认模型</span><input id="configModel" type="text" required placeholder="gpt-5.6-sol"></label>
        <label class="field"><span>API 模式</span><select id="configApiMode"><option value="responses">responses</option><option value="chat-completions">chat-completions</option></select></label>
        <label class="field"><span>API 传输</span><select id="configApiTransport"><option value="auto">自动</option><option value="python">Python/OpenSSL</option><option value="curl">curl/Schannel</option></select></label>
        <label class="field"><span>默认推理强度</span><select id="configReasoning"><option>low</option><option>medium</option><option>high</option><option>xhigh</option></select></label>
        <label class="field"><span>请求超时（秒）</span><input id="configTimeout" type="number" min="1" required></label>
        <label class="field"><span>超时自动重试</span><input id="configRetries" type="number" min="0" max="5" required></label>
        <label class="field"><span>最大输出 Tokens</span><input id="configMaxOutput" type="number" min="256" required></label>
        <label class="field model-field"><span>Lake 路径</span><input id="configLake" type="text" required placeholder="C:\Users\name\.elan\...\lake.exe"></label>
        <label class="field model-field"><span>API Key</span><input id="configApiKey" type="password" autocomplete="new-password" placeholder="留空则保留当前 Key"></label>
        <label class="field"><span>Lean LSP MCP</span><select id="configLspMode"><option value="off">关闭</option><option value="stdio">Windows 自动启动</option><option value="http">连接本机 HTTP</option></select></label>
        <label class="field model-field"><span>LSP MCP 命令</span><input id="configLspCommand" type="text" placeholder="lean-lsp-mcp"></label>
        <label class="field model-field"><span>rg.exe 路径（可选）</span><input id="configLspRgPath" type="text" placeholder="自动查找，或填写 C:\path\rg.exe"></label>
        <label class="field model-field"><span>LSP MCP URL</span><input id="configLspUrl" type="url" placeholder="http://127.0.0.1:8000/mcp"></label>
        <label class="field"><span>LSP 启动超时（秒）</span><input id="configLspStartupTimeout" type="number" min="1" required></label>
        <label class="field"><span>LSP 工具超时（秒）</span><input id="configLspCallTimeout" type="number" min="1" required></label>
        <label class="field"><span>每次 LSP 证据采集总预算（秒）</span><input id="configLspEvidenceBudget" type="number" min="1" required></label>
        <label class="field"><span>每轮 LSP 检索词</span><input id="configLspMaxTerms" type="number" min="1" max="10" required></label>
        <label class="check-field"><input id="configLspRemoteSearch" type="checkbox" checked><span>本地检索无结果时限量调用线上 Loogle</span></label>
        <label class="check-field"><input id="configLspLocalRepair" type="checkbox" checked><span>对单个 proof error 启用局部候选验证</span></label>
        <label class="field"><span>每个完整候选的局部轮次</span><input id="configLspLocalRounds" type="number" min="1" max="5" required></label>
        <label class="field"><span>每轮局部候选数</span><input id="configLspLocalCandidates" type="number" min="2" max="12" required></label>
        <label class="field"><span>单个局部候选验证超时（秒）</span><input id="configLspLocalValidationTimeout" type="number" min="1" required></label>
        <label class="field"><span>每个完整候选的局部修复总预算（秒）</span><input id="configLspLocalTotalBudget" type="number" min="1" required></label>
        <label class="field"><span>局部修复推理强度</span><select id="configLspLocalReasoning"><option>low</option><option>medium</option><option>high</option><option>xhigh</option></select></label>
      </div>
      <div class="key-status" id="configKeyStatus"></div>
      <label class="check-field"><input id="configDisableStorage" type="checkbox" checked><span>禁用响应存储（store=false）</span></label>
      <label class="check-field"><input id="configStreaming" type="checkbox" checked><span>启用 Responses SSE 流式接收</span></label>
      <label class="check-field"><input id="configClearKey" type="checkbox"><span>清除项目中保存的 API Key，改用环境变量</span></label>
      <div class="dialog-actions">
        <button class="button secondary" id="cancelConfigDialog" type="button">返回</button>
        <button class="button primary" id="saveConfigButton" type="submit">保存配置</button>
      </div>
    </form>
  </dialog>

  <script src="/assets/dashboard.js" defer></script>
</body>
</html>
